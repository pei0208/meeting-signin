<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會議簽到</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e2e0da;
    --text: #1a1a18;
    --muted: #7a7870;
    --accent: #2d6a4f;
    --accent-light: #e8f5ef;
    --danger: #c0392b;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .page-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }

  .page-header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .page-header p {
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%;
    max-width: 440px;
    box-shadow: var(--shadow);
  }

  .sig-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .sig-box {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 200px;
    cursor: crosshair;
    touch-action: none;
  }

  .sig-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .sig-hint span {
    font-size: 13px;
    color: #c0bdb6;
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .btn-ghost {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-ghost:hover { background: var(--bg); }

  .btn-primary {
    flex: 1;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 11px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 成功畫面 */
  .success {
    display: none;
    text-align: center;
    padding: 1rem 0;
  }

  .success-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }

  .success-icon svg {
    width: 26px;
    height: 26px;
    stroke: var(--accent);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .success h2 { font-size: 20px; font-weight: 700; }
  .success p { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .btn-next {
    display: inline-block;
    margin-top: 1.25rem;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-next:hover { opacity: 0.8; }

  .status-msg {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
  }

  .status-msg.error { color: var(--danger); }
</style>
</head>
<body>

<div class="page-header">
  <div class="badge">會議簽到</div>
  <h1>出席確認</h1>
  <p>請在下方完成手寫簽名</p>
</div>

<div class="card">
  <div id="formSection">
    <p class="sig-label">手寫簽名</p>
    <div class="sig-box">
      <canvas id="sigCanvas"></canvas>
      <div class="sig-hint" id="sigHint">
        <span>請用滑鼠或手指在此簽名</span>
      </div>
    </div>
    <div class="actions">
      <button class="btn-ghost" onclick="clearSig()">清除重簽</button>
      <button class="btn-primary" id="submitBtn" onclick="submitSig()">確認送出</button>
    </div>
    <p class="status-msg" id="statusMsg"></p>
  </div>

  <div class="success" id="successSection">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>簽到完成！</h2>
    <p id="successTime"></p>
    <button class="btn-next" onclick="resetForm()">下一位簽到</button>
  </div>
</div>

<script>
  // ⚠️ 部署 Apps Script 後，將網址貼在這裡
  const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false, hasSig = false;

  function initCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.parentElement.getBoundingClientRect().width;
    canvas.width = w * dpr;
    canvas.height = 200 * dpr;
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#1a1a18';
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  initCanvas();

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); markSig(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); markSig(); }, { passive: false });
  canvas.addEventListener('touchend', () => drawing = false);

  function markSig() {
    hasSig = true;
    document.getElementById('sigHint').style.display = 'none';
  }

  function clearSig() {
    const dpr = window.devicePixelRatio || 1;
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    hasSig = false;
    document.getElementById('sigHint').style.display = '';
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('statusMsg').className = 'status-msg';
  }

  function now() {
    return new Date().toLocaleString('zh-TW', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }

  async function submitSig() {
    if (!hasSig) { setStatus('請先完成簽名', true); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    setStatus('送出中…');

    const sigData = canvas.toDataURL('image/png');
    const timestamp = now();

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ signature: sigData, timestamp })
      });

      // no-cors 模式無法讀取回應，視為成功
      document.getElementById('successTime').textContent = timestamp;
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';

    } catch (err) {
      setStatus('送出失敗，請再試一次', true);
      btn.disabled = false;
    }
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg' + (isError ? ' error' : '');
  }

  function resetForm() {
    clearSig();
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('successSection').style.display = 'none';
    document.getElementById('formSection').style.display = 'block';
  }

  window.addEventListener('resize', () => { clearSig(); initCanvas(); });
</script>
</body>
</html>
